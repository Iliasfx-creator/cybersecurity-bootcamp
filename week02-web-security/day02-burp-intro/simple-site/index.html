<!DOCTYPE html>
<html>
<head>
    <title>Burp Local Test Site</title>
</head>
<body>
    <h1>Burp Local Test Site</h1>
    <p>This page is used to observe HTTP requests through Burp Proxy.</p>

    <form method="GET" action="/search">
        <label>Search query:</label>
        <input type="text" name="q" value="test">
        <button type="submit">Search</button>
    </form>

    <form method="POST" action="/login">
        <label>Username:</label>
        <input type="text" name="username" value="student">
        <label>Password:</label>
        <input type="password" name="password" value="lab-password">
        <button type="submit">Login</button>
    </form>
</body>
</html>
